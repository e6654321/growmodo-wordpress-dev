name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-west-2
  EB_APPLICATION_NAME: growmodo-estatein-dev
  EB_ENVIRONMENT_NAME: growmodo-estatein-dev-env

jobs:
  build:
    name: Build and Validate Theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y rsync zip unzip

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: PHP syntax check
        run: find . -path ./.git -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build WordPress theme package
        run: ./bin/build-package.sh

      - name: Build AWS Elastic Beanstalk package
        run: ./bin/build-aws-eb-package.sh

      - name: Validate package archives
        run: |
          unzip -t dist/growmodo-assessment-theme.zip
          unzip -t dist/growmodo-aws-eb-wordpress.zip

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: growmodo-wordpress-packages
          path: |
            dist/growmodo-assessment-theme.zip
            dist/growmodo-aws-eb-wordpress.zip
          if-no-files-found: error

  deploy-aws-eb:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.ENABLE_AWS_EB_DEPLOY == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y rsync zip unzip

      - name: Build AWS Elastic Beanstalk package
        run: ./bin/build-aws-eb-package.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload source bundle to S3
        run: |
          VERSION_LABEL="main-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          BUNDLE_KEY="elasticbeanstalk/${EB_APPLICATION_NAME}/${VERSION_LABEL}.zip"
          aws s3 cp dist/growmodo-aws-eb-wordpress.zip "s3://${{ secrets.AWS_EB_SOURCE_BUCKET }}/${BUNDLE_KEY}"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> "$GITHUB_ENV"
          echo "BUNDLE_KEY=${BUNDLE_KEY}" >> "$GITHUB_ENV"

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APPLICATION_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="${{ secrets.AWS_EB_SOURCE_BUCKET }}",S3Key="$BUNDLE_KEY"

      - name: Update Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "$EB_APPLICATION_NAME" \
            --environment-name "$EB_ENVIRONMENT_NAME" \
            --version-label "$VERSION_LABEL"
