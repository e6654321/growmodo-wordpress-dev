services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: growmodo_wp
      MYSQL_USER: growmodo
      MYSQL_PASSWORD: growmodo
      MYSQL_ROOT_PASSWORD: growmodo_root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pgrowmodo_root"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.6-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: growmodo_wp
      WORDPRESS_DB_USER: growmodo
      WORDPRESS_DB_PASSWORD: growmodo
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - wp_data:/var/www/html
      - ./:/var/www/html/wp-content/themes/growmodo-assessment

  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: growmodo_wp
      WORDPRESS_DB_USER: growmodo
      WORDPRESS_DB_PASSWORD: growmodo
    volumes:
      - wp_data:/var/www/html
      - ./:/var/www/html/wp-content/themes/growmodo-assessment
    working_dir: /var/www/html
    user: "33:33"
    entrypoint: ["wp"]

volumes:
  db_data:
  wp_data:
